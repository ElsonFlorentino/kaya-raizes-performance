# ============================================================
# Layer 7: CI/CD & Version Control
# Deploy automático da API (Cloudflare Worker) a cada push na main
# ============================================================

name: Deploy API (Cloudflare Worker)

on:
  push:
    branches: [main]
    paths:
      - 'api/**'              # só dispara quando a API muda
      - 'database/migrations/**'
  workflow_dispatch:

jobs:
  deploy-api:
    name: Deploy Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Instalar dependências
        run: npm ci
        working-directory: api

      - name: Verificar tipos TypeScript
        run: npm run typecheck
        working-directory: api

      - name: Aplicar migrations no banco de produção
        run: npx wrangler d1 migrations apply kaya-leads
        working-directory: api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy do Worker
        run: npm run deploy
        working-directory: api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

# Secrets necessários no GitHub (Settings → Secrets → Actions):
# CLOUDFLARE_API_TOKEN  → Cloudflare Dashboard → My Profile → API Tokens
# CLOUDFLARE_ACCOUNT_ID → Cloudflare Dashboard → barra lateral direita
